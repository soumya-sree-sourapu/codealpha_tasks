<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="authSection" style="display: none;">
        <div id="loginBox" class="auth-container">
            <h2>Sign In</h2>
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="loginEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" required placeholder="Enter password">
                </div>
                <button type="submit" class="auth-btn">Login</button>
            </form>
            <div class="toggle-link">
                Don't have an account? <span onclick="document.getElementById('loginBox').style.display='none'; document.getElementById('signupBox').style.display='block';">Sign Up</span>
            </div>
        </div>

        <div id="signupBox" class="auth-container" style="display: none;">
            <h2>Create Account</h2>
            <form onsubmit="handleSignup(event)">
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="signupUsername" required placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="signupEmail" required placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" required placeholder="Create password">
                </div>
                <button type="submit" class="auth-btn">Register</button>
            </form>
            <div class="toggle-link">
                Already have an account? <span onclick="document.getElementById('signupBox').style.display='none'; document.getElementById('loginBox').style.display='block';">Sign In</span>
            </div>
        </div>
    </div>

    <div id="mainPlatform" style="display: none;">
        <nav>
            <h2>🌐 SocialConnect</h2>
            <div>
                <button onclick="showView('mainPlatform'); loadPosts();" class="nav-link">Home</button>
                <button onclick="showFollowersList()" class="nav-link">Followers</button>
                <button onclick="showFollowingList()" class="nav-link">Following</button>
                <button onclick="showMyPosts()" class="nav-link">My Posts</button>
                <button onclick="handleLogout()" class="logout-btn">Logout 🚪</button>
            </div>
        </nav>

        <div class="app-layout">
            
            <div class="left-sidebar">
                <div class="profile-card">
                    <div class="profile-header-bg"></div>
                    <div class="profile-avatar">👤</div>
                    <h3 id="myCardUsername">@User</h3>
                    
                    <div class="profile-stats">
                        <div class="stat-box">
                            <span class="stat-val" id="myCardPosts">0</span>
                            <span class="stat-lbl">Posts</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-val" id="myCardFollowers">0</span>
                            <span class="stat-lbl">Followers</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-val" id="myCardFollowing">0</span>
                            <span class="stat-lbl">Following</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="main-content">
                <div id="createPostSection" class="card">
                    <h3 style="margin-top: 0; color:#555; font-size: 16px;">Share Something Honey...</h3>
                    <textarea id="postContent" placeholder="What's on your mind?"></textarea>
                    <div style="text-align: right;">
                        <button onclick="createPost()" class="post-btn">Publish Post 🚀</button>
                    </div>
                </div>

                <div id="feed"></div>
            </div>

        </div>
    </div>

    <div id="followersView" class="container" style="display: none;">
        <div class="card">
            <button onclick="showView('mainPlatform'); loadPosts();" class="back-btn">⬅ Back to Feed</button>
            <h2>👥 Your Followers</h2>
            <div id="followersListContainer"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
